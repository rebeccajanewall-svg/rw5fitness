<!DOCTYPE html>
<html>
<head>
  <title>RW5 Fitness</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f8f8f8;
      margin: 0;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      padding: 40px;
    }

    .login-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
  </style>

  <!-- Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>

<header>RW5 Fitness</header>

<div class="container">

  <h2>Welcome to RW5 Fitness</h2>
  <p>Your transformation starts here.</p>

  <div class="login-box">
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="status"></p>
  </div>

  <div id="dashboard" style="display:none;">
    <h2>Welcome to your dashboard</h2>
    <p>You are logged in 🎉</p>
  </div>

</div>

<script>
  const supabaseUrl = "https://nqhubqwvxjchokweunbj.supabase.co"
  const supabaseKey = "YOUR_ANON_KEY"

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

  async function signup() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signUp({
      email,
      password
    })

    document.getElementById("status").innerText =
      error ? error.message : "Check your email to confirm signup"
  }

  async function login() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    })

    if (error) {
      document.getElementById("status").innerText = error.message
    } else {
      document.getElementById("status").innerText = "Logged in!"

      document.querySelector(".login-box").style.display = "none"
      document.getElementById("dashboard").style.display = "block"
    }
  }
</script>

</body>
</html>
